services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      # Persist the DB inside the mounted runs volume so runs survive restarts.
      DATABASE_URL: sqlite:////app/backend/data/runs/ares_lite.db
      ARES_DATA_DIR: /app/backend/data
      ARES_RUNS_DIR: /app/backend/data/runs
    volumes:
      - ares_runs:/app/backend/data/runs
      - ares_demo:/app/backend/data/demo
    ports:
      - "${ARES_BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "${ARES_FRONTEND_PORT:-5173}:80"

volumes:
  ares_runs:
  ares_demo:
